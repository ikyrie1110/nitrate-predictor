name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy==1.22.1
        pip install scikit-learn==1.3.2
        pip install joblib==1.4.2
        pip install catboost==1.2.7
        pip install tqdm==4.66.1
        pip install pyinstaller==6.5.0
    
    - name: Verify versions
      run: |
        python -c "import sklearn; print('sklearn:', sklearn.__version__)"
        python -c "import numpy; print('numpy:', numpy.__version__)"
        python -c "import joblib; print('joblib:', joblib.__version__)"
        python -c "import catboost; print('catboost:', catboost.__version__)"
        python -c "import tqdm; print('tqdm:', tqdm.__version__)"
    
    - name: Test model prediction
      run: |
        python -c "import joblib; import numpy as np; rf = joblib.load('RandomForest_updated_model.joblib'); test = np.array([[2020,116.4,12.5,39.9,15.2,8.3,15.6,1013,25.1,45.3,2.1,0.65]]); print('RF prediction:', rf.predict(test)[0])"
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --console --name NitratePredictor `
          --hidden-import=sklearn `
          --hidden-import=sklearn.ensemble `
          --hidden-import=sklearn.tree `
          --hidden-import=sklearn.linear_model `
          --hidden-import=sklearn.utils `
          --hidden-import=catboost `
          --hidden-import=tqdm `
          --add-data "RandomForest_updated_model.joblib;." `
          --add-data "CatBoost_updated_model.joblib;." `
          --add-data "ElasticNet_best_meta_model.joblib;." `
          predict_simple.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: NitratePredictor
        path: dist/NitratePredictor.exe
